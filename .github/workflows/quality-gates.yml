name: Quality gates

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dev deps
        run: pip install -e '.[dev]'
      - run: ruff check scripts
      - run: ruff format --check scripts

  typecheck-python:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -e '.[dev]'
      - run: mypy scripts

  content-quality:
    name: Content & SEO gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run unified quality gate
        run: python3 scripts/check_quality.py

  build-idempotency:
    name: Build idempotency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build assets
        run: |
          python3 scripts/build_og_image.py
          python3 scripts/build_seo_assets.py
      - name: Verify build is idempotent
        run: |
          if ! git diff --quiet; then
            echo "ERROR: rebuild produced different output. Build is not idempotent."
            git diff --stat
            exit 1
          fi

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
